# Production-style stack for RunPod (or any host): Postgres + MinIO + API + nginx on port 8000.
# Default data root: /workspace/data — attach a RunPod network volume at /workspace for persistence.
# Override: export VOICERA_DATA_DIR=/path/to/data before `docker compose -f docker-compose.prod.yml up`.

services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=512MB
    environment:
      POSTGRES_USER: voicera
      POSTGRES_PASSWORD: voicera
      POSTGRES_DB: voicera
    volumes:
      - ${VOICERA_DATA_DIR:-/workspace/data}/pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ${VOICERA_DATA_DIR:-/workspace/data}/miniodata:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # One-shot bucket create (minio image does not include mc; use minio/mc sidecar)
  minio_init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 3
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/voicera-recordings --ignore-existing || true
    restart: "no"

  api:
    build: ./backend
    env_file: ./backend/.env
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "1",
      ]
    volumes:
      - ${VOICERA_DATA_DIR:-/workspace/data}/appdata:/app/data
    depends_on:
      - postgres
      - minio
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G

  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
